services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      FLASK_APP: run.py
      FLASK_CONFIG: development
      DATABASE_URL: postgresql://dmm:dmm@db:5432/dmm_fantasy
      SECRET_KEY: dev-secret-local-only
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=8080 --debug

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dmm
      POSTGRES_PASSWORD: dmm
      POSTGRES_DB: dmm_fantasy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
