[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["_reference/", "migrations/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"
markers = [
    "live: hits real OSRS hiscores API — requires internet (run with: pytest -m live)",
]
